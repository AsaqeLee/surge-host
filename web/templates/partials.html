{{define "header"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body data-auth-enabled="{{.AuthEnabled}}" data-admin-user="{{.AdminUser}}">
    <div class="app-bg" aria-hidden="true"></div>
    <header class="site-header">
        <div class="container header-inner">
            <a href="/" class="brand">
                <span class="brand-mark" aria-hidden="true">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect x="2" y="2" width="24" height="24" rx="6" stroke="currentColor" stroke-width="1.5"/><path d="M8 14h12M14 8v12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                </span>
                <span class="brand-text">
                    <span class="brand-name">Surge Host</span>
                    <span class="brand-tag">规则集云端托管</span>
                </span>
            </a>
            <nav class="site-nav" aria-label="主导航">
                <a href="/" class="nav-link{{if eq .ActiveNav "home"}} is-active{{end}}">
                    <span class="nav-index">01</span>首页
                </a>
                <a href="/upload" class="nav-link{{if eq .ActiveNav "upload"}} is-active{{end}}">
                    <span class="nav-index">02</span>上传
                </a>
                <a href="/files" class="nav-link{{if eq .ActiveNav "files"}} is-active{{end}}">
                    <span class="nav-index">03</span>管理
                </a>
            </nav>
            <div class="auth-area" id="auth-area"></div>
        </div>
    </header>
    <main class="page-main">
        <div class="container">
            <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
{{end}}

{{define "footer"}}
        </div>
    </main>
    <footer class="site-footer">
        <div class="container footer-inner">
            <p class="footer-copy">surge-host · 轻量自托管</p>
            <p class="footer-domain"><code>{{.Domain}}</code></p>
        </div>
    </footer>

    <div id="login-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="login-title">
        <div class="modal-backdrop"></div>
        <div class="modal-card">
            <div class="modal-head">
                <h3 id="login-title">登录</h3>
                <p class="muted">管理文件需要管理员凭据</p>
            </div>
            <form id="login-form" class="stack-form">
                <label class="field">
                    <span class="field-label">用户名</span>
                    <input type="text" id="login-user" value="{{.AdminUser}}" autocomplete="username">
                </label>
                <label class="field">
                    <span class="field-label">密码</span>
                    <input type="password" id="login-pass" autocomplete="current-password">
                </label>
                <button type="submit" class="btn btn-primary btn-block">登录</button>
            </form>
        </div>
    </div>
    <script src="/static/js/app.js"></script>
{{end}}
