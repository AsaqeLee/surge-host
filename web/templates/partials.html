{{define "header"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#fafafa">
    <meta name="description" content="Multi-platform configuration hosting for Surge, Meta/Mihomo, and sing-box.">
    <title>{{.Title}}</title>
    <script>
    (function(){
      var k='surge_host_theme',s=localStorage.getItem(k),
      t=s||(matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');
      document.documentElement.dataset.theme=t;
    })();
    </script>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/system.css">
</head>
<body data-auth-enabled="{{.AuthEnabled}}" data-admin-user="{{.AdminUser}}">
    <header class="site-header">
        <div class="header-inner">
            <a href="/" class="brand">
                <span class="brand-mark" aria-hidden="true">R</span>
                <span class="brand-name">rules</span>
            </a>
            <nav class="site-nav" aria-label="Main navigation">
                <a href="/" class="nav-link{{if eq .ActiveNav "home"}} is-active{{end}}">[ Home ]</a>
                <a href="/upload" class="nav-link{{if eq .ActiveNav "upload"}} is-active{{end}}">[ Upload ]</a>
                <a href="/files" class="nav-link{{if eq .ActiveNav "files"}} is-active{{end}}">[ Manage ]</a>
            </nav>
            <div class="header-tools">
                <span class="header-version" aria-label="Build version">v2.4.1</span>
                <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
                    <svg class="theme-icon-sun" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
                    <span class="theme-label-sm" id="theme-label">Light</span>
                </button>
                <div class="auth-area" id="auth-area"></div>
                <button type="button" class="nav-mobile-toggle" id="nav-mobile-toggle" aria-label="Toggle navigation">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 5h16M4 12h16M4 19h16"/></svg>
                </button>
            </div>
        </div>
        <div class="mobile-nav" id="mobile-nav">
            <a href="/" class="nav-link{{if eq .ActiveNav "home"}} is-active{{end}}">[ Home ]</a>
            <a href="/upload" class="nav-link{{if eq .ActiveNav "upload"}} is-active{{end}}">[ Upload ]</a>
            <a href="/files" class="nav-link{{if eq .ActiveNav "files"}} is-active{{end}}">[ Manage ]</a>
        </div>
    </header>
    <main class="page-shell">
        <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
{{end}}

{{define "footer"}}
    </main>
    <footer class="site-footer">
        <div class="footer-inner">
            <p class="footer-copy">[ RULES HOSTING SYSTEM v2.4.1 ]</p>
            <p class="footer-domain">{{.Domain}}</p>
        </div>
    </footer>

    <div id="login-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="login-title">
        <div class="modal-backdrop"></div>
        <div class="modal-card">
            <div class="modal-head">
                <h3 id="login-title">Sign In</h3>
                <p class="muted">Administrator credentials required</p>
            </div>
            <form id="login-form" class="stack-form">
                <label class="field">
                    <span class="field-label">Username</span>
                    <input type="text" id="login-user" value="{{.AdminUser}}" autocomplete="username" class="input-industrial">
                </label>
                <label class="field">
                    <span class="field-label">Password</span>
                    <input type="password" id="login-pass" autocomplete="current-password" class="input-industrial">
                </label>
                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
            </form>
        </div>
    </div>
    <script src="/static/js/app.js?v=2.4.2"></script>
{{end}}
