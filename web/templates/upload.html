{{template "header" .}}
        <div class="shell shell--narrow">
            <div class="page-back-bar">
                <a href="/" class="page-back">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
                    Back
                </a>
                <div class="tech-divider"></div>
            </div>

            <section class="panel">
                <div class="panel-hd">
                    <span class="panel-id">UPL/01</span>
                    <span class="panel-title">Upload</span>
                </div>
                <div class="panel-body">
                    <section class="page-head">
                        <h1 class="page-title title-serif">Upload Configuration</h1>
                        <p class="muted">Upload {{.AllowedExts}} files. Max {{.MaxFileSize}} bytes per file.</p>
                    </section>

                    <section class="upload-layout">
                        <div id="dropzone" class="dropzone" tabindex="0" role="button" aria-label="Drop or select files to upload">
                            <div class="dropzone-icon" aria-hidden="true">
                                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12"/><path d="m17 8-5-5-5 5"/><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/></svg>
                            </div>
                            <p class="dropzone-title">Drop files here or click to browse</p>
                            <p class="muted">{{.AllowedExts}} — max {{.MaxFileSize}} bytes</p>
                            <input type="file" id="file-input" accept="{{.AllowedExts}}" hidden>
                            <button type="button" class="btn btn-secondary" id="pick-btn">Browse</button>
                        </div>

                        <form id="upload-form" class="upload-form">
                            <label class="field">
                                <span class="field-label">Save Path</span>
                                <span class="field-hint muted">Leave empty to use the original filename</span>
                                <input type="text" id="upload-path" class="input-industrial" placeholder="e.g. rules.list, meta.yaml, subdir/sing-box.json">
                            </label>
                            <div id="upload-preview" class="upload-preview hidden">
                                <div class="preview-icon" aria-hidden="true">FILE</div>
                                <div>
                                    <span id="preview-name" class="preview-name"></span>
                                    <span id="preview-size" class="muted"></span>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary btn-block" id="upload-btn" disabled>Upload</button>
                        </form>

                        <div id="upload-result" class="result-box hidden"></div>
                    </section>
                </div>
            </section>
        </div>
{{template "footer" .}}
<script src="/static/js/upload.js"></script>
