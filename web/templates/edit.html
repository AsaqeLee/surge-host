{{template "header" .}}
        <div class="shell shell--wide">
            <div class="page-back-bar">
                <a href="/files" class="page-back">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
                    Back
                </a>
                <div class="tech-divider"></div>
            </div>

            <section class="panel">
                <div class="panel-hd">
                    <span class="panel-id">EDT/01</span>
                    <span class="panel-title">Editor</span>
                </div>
                <div class="panel-body">
                    <section class="editor-toolbar">
                        <div class="editor-info">
                            <p class="page-kicker">Edit</p>
                            <h1 class="page-title"><code id="editor-path">{{.FilePath}}</code></h1>
                        </div>
                        <div class="editor-actions">
                            <div class="url-field url-field--compact">
                                <input type="text" class="url-input" id="editor-raw-url" readonly title="Right-click to copy Raw URL" onclick="this.select()" aria-label="Raw URL">
                                <button type="button" class="btn btn-ghost btn-sm copy-btn" id="editor-copy-url">Copy</button>
                            </div>
                            <div class="editor-btn-group">
                                <button type="button" class="btn btn-secondary btn-sm" id="validate-btn">Validate</button>
                                <button type="button" class="btn btn-secondary btn-sm" id="history-btn">History</button>
                                <button type="button" class="btn btn-primary btn-sm" id="save-btn">Save</button>
                            </div>
                        </div>
                    </section>

                    <section class="editor-section">
                        <div class="editor-wrap">
                            <div class="editor-gutter" aria-hidden="true">text</div>
                            <pre class="editor-highlight" aria-hidden="true"><code id="highlight-code"></code></pre>
                            <textarea id="editor" class="editor-input" spellcheck="false" aria-label="File content"></textarea>
                        </div>
                        <div class="editor-foot">
                            <p class="editor-status" id="editor-status">Loading…</p>
                            <span class="editor-hint">⌘S / Ctrl+S to save</span>
                        </div>
                        <div id="validation-panel" class="validation-panel hidden"></div>
                    </section>
                </div>
            </section>
        </div>

        <div id="history-modal" class="modal hidden" role="dialog" aria-modal="true">
            <div class="modal-backdrop"></div>
            <div class="modal-card modal-wide">
                <div class="modal-head">
                    <h3>Version History</h3>
                </div>
                <div id="history-list" class="history-list"></div>
                <button type="button" class="btn btn-secondary" id="history-close">Close</button>
            </div>
        </div>
{{template "footer" .}}
<script>
    window.EDITOR_PATH = {{printf "%q" .FilePath}};
</script>
<script src="/static/js/editor.js"></script>
